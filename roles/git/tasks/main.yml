# code: language=ansible
---
- name: Setup {{ app }}
  vars:
    app: "git"
  block:
    - name: "Install {{ app }}"
      when: not is_mac # Handle MacOSX in brew bundle
      become: true
      ansible.builtin.package:
        name: "{{ item.name }}"
        state: "{{ item.state | default('present') }}"
      with_items:
        - {name: "git"}
        - {name: "git-extras"}  # TODO: Add script
        - {name: "git-flow"}
      tags:
        - never

    - name: Configure global git configs
      git_config:
          name: "{{ item.name }}"
          scope: global
          state: "{{ item.state | default('present') }}"
          value: "{{ item.value }}"
      loop: "{{ git_global_configs + git_global_configs_ex }}"
